<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@devify/ui — Design System Explorer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Saira+Stencil+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../devify.css">
  <script type="module" src="../devify.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--dvfy-font-sans);
      background: var(--dvfy-surface-page);
      color: var(--dvfy-text-primary);
      line-height: var(--dvfy-leading-normal);
    }
    .catalog-layout {
      display: flex;
      height: calc(100vh - var(--dvfy-nav-height, 3.5rem));
    }
    #catalog-drawer {
      height: 100%;
    }
    #catalog-drawer .dvfy-drawer__body {
      padding: 0;
    }
    #catalog-sidebar {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .catalog-main {
      flex: 1;
      overflow-y: auto;
      padding: var(--dvfy-space-6);
    }
  </style>
</head>
<body>
  <dvfy-nav brand="@devify/ui" logo="devify-hz.png" sticky scroll-shrink>
    <dvfy-theme-switcher default-theme="devify-cyan">
      <option value="devify-cyan">Cyan</option>
      <option value="devify-pink">Pink</option>
    </dvfy-theme-switcher>
  </dvfy-nav>

  <div class="catalog-layout">
    <dvfy-drawer id="catalog-drawer" position="left" header="Navigation" width="17rem"></dvfy-drawer>
    <main id="main-content" class="catalog-main"></main>
  </div>

  <script type="module" src="./catalog.js"></script>
</body>
</html>
